name: Documentation Maintenance

on:
  schedule:
    # Run weekly on Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate marketplace files
        run: bash scripts/generate.sh

      - name: Validate plugins
        run: bash scripts/validate.sh

      - name: Check documentation freshness
        id: freshness
        run: bash scripts/docs-freshness.sh || true

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update generated documentation"
          title: "docs: update generated documentation"
          body: |
            Automated documentation update from scheduled maintenance.
            
            Changes:
            - Regenerated marketplace files
            - Updated any stale documentation
            
            This PR was created automatically by the documentation maintenance workflow.
          branch: docs/maintenance-update
          delete-branch: true

  external-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check external links
        id: links
        run: |
          echo "Checking external links in documentation..."
          echo ""
          
          BROKEN=""
          REDIRECTS=""
          
          # Extract all external links from markdown files and website
          while IFS= read -r file; do
            links=$(grep -oE 'https?://[^)"` >]+' "$file" | sort -u || true)
            
            for url in $links; do
              # Clean up URL (remove trailing punctuation)
              url=$(echo "$url" | sed 's/[.,;:)]*$//')
              
              # Skip known non-checkable URLs
              case "$url" in
                *github.com/palmshed/mull*|*anthropic.com*) continue ;;
              esac
              
              # Check URL
              status=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 10 "$url" 2>/dev/null || echo "000")
              
              case "$status" in
                200) ;; # OK
                301|302) 
                  REDIRECTS="${REDIRECTS}- $url -> $status (in $file)\n"
                  ;;
                404|410)
                  BROKEN="${BROKEN}- $url -> $status (in $file)\n"
                  ;;
                000)
                  BROKEN="${BROKEN}- $url -> timeout (in $file)\n"
                  ;;
                *)
                  BROKEN="${BROKEN}- $url -> $status (in $file)\n"
                  ;;
              esac
            done
          done < <(find . -name "*.md" -not -path "./.git/*" -not -path "./node_modules/*" && find .github/website -name "*.html" 2>/dev/null || true)
          
          # Report results
          if [ -n "$BROKEN" ]; then
            echo "Broken links found:"
            echo -e "$BROKEN"
            echo "broken=true" >> $GITHUB_OUTPUT
          else
            echo "No broken links found"
            echo "broken=false" >> $GITHUB_OUTPUT
          fi
          
          if [ -n "$REDIRECTS" ]; then
            echo "Redirects (consider updating):"
            echo -e "$REDIRECTS"
          fi

      - name: Create issue for broken links
        if: steps.links.outputs.broken == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## Broken External Links
            
            The weekly documentation maintenance workflow detected broken external links.
            
            Please review and update the affected documentation.
            
            See the workflow logs for details.`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'docs: broken external links detected',
              body: body,
              labels: ['documentation', 'automated']
            });
